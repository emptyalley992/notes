<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>笔记库</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/style.min.css" />
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '技术笔记',
      repo: '',
      // 【关键配置 1】：不加载自定义侧边栏，让它默认抓取每篇文章的标题
      loadSidebar: true, 
      auto2top: true,  // 2. 建议加上这个，这样点击侧边栏标题时，右侧会自动滚动到对应位置
      subMaxLevel: 0,      // 侧边栏显示的标题层级（H2, H3）
      
      // 【关键配置 2】：搜索功能，方便你笔记多了以后查找
      search: {
        placeholder: '搜索笔记...',
        noData: '找不到结果',
        depth: 6
      },
      // 核心配置：无论在哪个子目录下，都统一使用根目录下的 _sidebar.md
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      sidebarDisplayLevel: 2,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
