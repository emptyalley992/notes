<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>我的技术笔记库</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '技术笔记',
      // 【关键配置 1】：不加载自定义侧边栏，让它默认抓取每篇文章的标题
      loadSidebar: false, 
      subMaxLevel: 3,      // 侧边栏显示的标题层级（H2, H3）
      
      // 【关键配置 2】：搜索功能，方便你笔记多了以后查找
      search: {
        placeholder: '搜索笔记...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
